plugins {
    id 'com.android.application'
}

android {
    namespace 'com.example.photosender'
    compileSdk 34

    defaultConfig {
        applicationId "com.example.photosender"
        minSdk 21
        targetSdk 34
        versionCode 1
        versionName "1.0"
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    buildTypes {
        release {
            minifyEnabled false
        }
    }
}

dependencies {

    implementation 'androidx.appcompat:appcompat:1.6.1'
    implementation 'androidx.core:core-ktx:1.12.0'

    // 🔥 FORCE kotlin single version (fix duplicate error)
    implementation(platform("org.jetbrains.kotlin:kotlin-bom:1.8.22"))
}
